<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Selfish Mining Simulator</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5f6b76;
      --grid: #d8dee5;
      --panel: #f5f7fa;
      --accent: #087f8c;
      --warn: #b43b53;
      --gold: #b7791f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: #ffffff;
    }
    header, main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }
    header { padding: 28px 0 16px; }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    p {
      max-width: 780px;
      color: var(--muted);
      line-height: 1.55;
      margin: 0;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 16px;
      background: var(--panel);
      border: 1px solid #e1e6eb;
      border-radius: 8px;
      margin: 10px 0 18px;
    }
    label {
      font-size: 14px;
      color: var(--muted);
    }
    select {
      margin-left: 8px;
      min-width: 90px;
      padding: 7px 10px;
      border: 1px solid #b7c1cb;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
    }
    .chart-wrap {
      width: 100%;
      border: 1px solid #dfe5eb;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    canvas {
      display: block;
      width: 100%;
      height: min(62vh, 560px);
      min-height: 360px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      padding: 14px 0 28px;
      color: var(--muted);
      font-size: 14px;
    }
    .key { display: inline-flex; align-items: center; gap: 8px; }
    .swatch { width: 22px; height: 3px; border-radius: 3px; display: inline-block; }
    .accent { background: var(--accent); }
    .warn { background: var(--warn); }
    .gold { background: var(--gold); }
  </style>
</head>
<body>
  <header>
    <h1>Experiment 1: Gamma Sweep</h1>
    <p>We directly sweep gamma values to study how selfish mining profitability changes with network advantage. The vertical line marks the theoretical threshold alpha &gt; (1 - gamma) / (3 - 2 gamma).</p>
  </header>

    <div class="toolbar">
      <label>gamma

      </label>
    </div>
    <div class="chart-wrap">

    </div>
    <div class="legend">
      <span class="key"><span class="swatch accent"></span>Simulated relative revenue</span>
      <span class="key"><span class="swatch warn"></span>Break-even line</span>
      <span class="key"><span class="swatch gold"></span>Theoretical threshold</span>
    </div>
  </main>

      ctx.fillStyle = '#5f6b76';
      ctx.font = '13px Arial';
      for (let i = 0; i <= 5; i++) {
        const alpha = i / 10;
        ctx.beginPath();
        ctx.moveTo(x(alpha), pad.top);
        ctx.lineTo(x(alpha), pad.top + plotH);
        ctx.stroke();
        ctx.fillText(alpha.toFixed(1), x(alpha) - 9, pad.top + plotH + 26);
      }
      for (let i = 0; i <= 6; i++) {
        const value = i / 10;
        ctx.beginPath();
        ctx.moveTo(pad.left, y(value));
        ctx.lineTo(pad.left + plotW, y(value));
        ctx.stroke();
        ctx.fillText(value.toFixed(1), 22, y(value) + 4);
      }

      ctx.strokeStyle = '#b43b53';
      ctx.setLineDash([7, 6]);
      ctx.beginPath();
      ctx.moveTo(x(0), y(0));
      ctx.lineTo(x(0.5), y(0.5));
      ctx.stroke();

      ctx.strokeStyle = '#b7791f';
      ctx.beginPath();
      ctx.moveTo(x(threshold), pad.top);
      ctx.lineTo(x(threshold), pad.top + plotH);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.strokeStyle = '#087f8c';
      ctx.lineWidth = 3;
      ctx.beginPath();
      series.forEach((row, index) => {
        const px = x(row.alpha);
        const py = y(row.relativeRevenue);
        if (index === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.stroke();

      ctx.fillStyle = '#17202a';
      ctx.font = '14px Arial';
      ctx.fillText('Attacker hash share alpha', pad.left + plotW / 2 - 78, height - 14);
      ctx.save();
      ctx.translate(16, pad.top + plotH / 2 + 82);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText('Relative attacker revenue', 0, 0);
      ctx.restore();
      ctx.fillText(`threshold alpha ~= ${threshold.toFixed(3)}`, x(threshold) + 8, pad.top + 18);
    }

    select.addEventListener('change', draw);
    window.addEventListener('resize', draw);
    draw();
  </script>
</body>
</html>
